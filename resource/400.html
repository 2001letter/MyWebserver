<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>400 - 错误请求</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .error-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 2.5rem 2rem;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .error-card:hover {
            transform: scale(1.01);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc2626, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 1rem;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 2rem;
            border-left: 3px solid #f97316;
            padding-left: 1rem;
            text-align: left;
            background: #fef9e6;
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            background: #0f172a;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .error-card {
                padding: 1.8rem;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">400</div>
        <h1 class="error-title">错误的请求</h1>
        <div class="error-message">
            服务器无法理解您的请求语法。请检查请求参数后重试。
        </div>
        <div class="actions">
            <a href="/index.html" class="btn btn-primary">🏠 返回首页</a>
        </div>
    </div>
</body>
</html>
