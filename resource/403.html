<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>403 - 禁止访问</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .error-card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1rem;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 2rem;
            border-left: 3px solid #ef4444;
            padding-left: 1rem;
            text-align: left;
            background: #fef2f2;
            border-radius: 0.5rem;
            padding: 1rem;
        }
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .btn-primary {
            background: #1e293b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f172a;
            transform: translateY(-2px);
        }
        @media (max-width: 480px) {
            .error-card { padding: 1.8rem; }
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">403</div>
        <h1 class="error-title">禁止访问</h1>
        <div class="error-message">
            您没有权限查看此内容。请联系管理员或更换账号后重试。
        </div>
        <div class="actions">
            <a href="/" class="btn btn-primary">🏠 返回首页</a>
        </div>
    </div>
</body>
</html>
